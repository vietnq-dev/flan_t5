experiment:
  id: "base"
  name: "base_config"
  description: "Base configuration with shared defaults"
  tags: []

model:
  name_or_path: "google/flan-t5-small"
  tokenizer_name: null
  from_pt: false
  trust_remote_code: false

data:
  dataset_name: "kaist-ai/CoT-Collection"
  dataset_config: null
  num_tasks: null
  use_cot: true
  max_source_length: 512
  max_target_length: 256
  preprocessing_num_workers: 4
  overwrite_cache: false
  train_split: "train"
  eval_ratio: 0.05
  seed: 42

training:
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 5.0e-5
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  warmup_ratio: 0.06
  warmup_steps: 0
  lr_scheduler_type: "linear"
  optim: "adamw_torch"
  max_steps: -1

precision:
  fp16: null
  bf16: null
  tf32: null

logging:
  logging_steps: 50
  logging_first_step: true
  logging_dir: null
  report_to:
    - "tensorboard"

saving:
  save_strategy: "epoch"
  save_steps: 500
  save_total_limit: 2
  save_only_model: false

evaluation:
  evaluation_strategy: "epoch"
  eval_steps: 500
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  load_best_model_at_end: true
  predict_with_generate: true

generation:
  max_length: 256
  num_beams: 4
  early_stopping: true

advanced:
  seed: 42
  dataloader_num_workers: 0
  gradient_checkpointing: false
  deepspeed: null
  fsdp: null
  push_to_hub: false
  hub_model_id: null
  resume_from_checkpoint: null
