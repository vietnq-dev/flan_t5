experiment:
  id: "exp33"
  name: "cot_base_with_cot"
  description: "Flan-T5-Base fine-tuned on CoT-Collection WITH chain-of-thought rationales"
  tags: [flan-t5-base, cot, exp33, with-cot]

model:
  name_or_path: "google/flan-t5-base"

data:
  dataset_name: "kaist-ai/CoT-Collection"
  num_tasks: null
  use_cot: true
  max_source_length: 384
  max_target_length: 256
  eval_ratio: 0.05

training:
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 5.0e-5
  lr_scheduler_type: "linear"
  warmup_ratio: 0.06

precision:

logging:
  logging_steps: 50
  report_to:
    - "tensorboard"

saving:
  save_strategy: "epoch"
  save_total_limit: 2

evaluation:
  evaluation_strategy: "epoch"
  predict_with_generate: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  load_best_model_at_end: true

generation:
  max_length: 256
  num_beams: 4
